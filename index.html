<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Picker Roulette</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" href="ttps://www.fcae.ca/static/site-content/prefs/Vv3tBn7xddPBrv3jL9HxJ9JzD.svg.svg">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f1f5f9;
        }

        .wheel-container {
            position: relative;
            width: 100%;
            max-width: 500px;
            aspect-ratio: 1 / 1;
            margin: 0 auto;
        }

        #wheel {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 12px solid #1e293b;
            position: relative;
            overflow: hidden;
            transition: transform 5s cubic-bezier(0.1, 0, 0.1, 1);
            background: #fff;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.2);
            transform: rotate(0deg);
        }

        /* The pointer is at the very top (0 degrees) */
        .pointer {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 40px;
            height: 50px;
            background: #f43f5e;
            clip-path: polygon(50% 100%, 0 0, 100% 0);
            z-index: 30;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3));
        }

        .center-hub {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 50px;
            height: 50px;
            background: #1e293b;
            border: 6px solid #fff;
            border-radius: 50%;
            z-index: 20;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
        }

        .slice {
            position: absolute;
            width: 100%;
            height: 100%;
            left: 50%;
            top: 50%;
            transform-origin: 0% 0%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .slice-content {
            position: absolute;
            left: 0;
            top: 0;
            width: 250px; 
            height: 40px;
            margin-top: -20px; 
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 35px;
            transform-origin: 0% 50%;
            color: white;
            font-weight: 800;
            text-shadow: 1px 1px 4px rgba(0,0,0,0.6);
            white-space: nowrap;
            pointer-events: none;
            z-index: 5;
            letter-spacing: -0.02em;
        }

        .modal-overlay {
            background-color: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(8px);
        }

        .animate-pop {
            animation: pop 0.4s cubic-bezier(0.26, 0.53, 0.74, 1.48);
        }

        @keyframes pop {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .sound-toggle {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 40;
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #f1f5f9;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-7xl mx-auto">
        <header class="text-center mb-10">
            <h1 class="text-5xl font-black text-slate-900 mb-2 tracking-tight">Student Roulette</h1>
            <p class="text-slate-500 text-lg">Pick a student at random with high precision.</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-10">
            <!-- Sidebar -->
            <div class="lg:col-span-4 bg-white p-8 rounded-3xl shadow-xl border border-slate-100 flex flex-col max-h-[800px]">
                <div class="mb-6">
                    <h2 class="text-2xl font-bold text-slate-800 mb-1">Class List</h2>
                    <p class="text-slate-500 text-sm">Add or edit names below</p>
                </div>
                
                <div class="flex gap-2 mb-6">
                    <input type="text" id="studentInput" placeholder="Enter student name..." 
                        class="flex-1 px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:bg-white transition-all">
                    <button onclick="addStudent()" 
                        class="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-3 rounded-xl font-bold transition-all shadow-md active:scale-95">
                        Add
                    </button>
                </div>

                <div id="studentList" class="flex-1 space-y-3 overflow-y-auto pr-2 custom-scrollbar"></div>

                <div class="mt-8 pt-6 border-t border-slate-100 flex items-center justify-between">
                    <span id="studentCount" class="text-sm font-bold text-slate-500 uppercase tracking-wider">0 Students</span>
                    <button onclick="clearAll()" class="text-sm text-rose-500 hover:text-rose-700 font-bold flex items-center gap-1 transition">
                        Clear All
                    </button>
                </div>
            </div>

            <!-- Main Area -->
            <div class="lg:col-span-8 flex flex-col items-center justify-center">
                <div class="wheel-container mb-12">
                    <div class="pointer"></div>
                    <div class="center-hub"></div>
                    <div id="wheel"></div>
                </div>

                <button id="spinBtn" onclick="spin()" 
                    class="bg-slate-900 hover:bg-slate-800 text-white text-2xl font-black py-5 px-16 rounded-2xl shadow-2xl transform active:scale-95 transition-all disabled:opacity-30 disabled:cursor-not-allowed group">
                    <span class="flex items-center gap-3">
                        SPIN TO PICK
                    </span>
                </button>
            </div>
        </div>
    </div>

    <!-- Result Modal -->
    <div id="resultModal" class="hidden fixed inset-0 modal-overlay z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-[2rem] shadow-2xl max-w-md w-full p-10 text-center animate-pop">
            <div class="w-20 h-20 bg-indigo-100 text-indigo-600 rounded-full flex items-center justify-center mx-auto mb-6">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7" />
                </svg>
            </div>
            <div class="text-indigo-600 font-extrabold uppercase tracking-[0.2em] text-xs mb-2">The chosen one is</div>
            <h2 id="winnerName" class="text-5xl font-black text-slate-900 mb-8 break-words leading-tight">Student Name</h2>
            
            <div class="grid grid-cols-1 gap-3">
                <button onclick="removeSelected()" class="bg-rose-500 hover:bg-rose-600 text-white font-bold py-4 rounded-2xl transition-all shadow-lg shadow-rose-200">
                    Remove from list
                </button>
                <button onclick="closeModal()" class="bg-slate-100 hover:bg-slate-200 text-slate-600 font-bold py-4 rounded-2xl transition-all">
                    Keep in list
                </button>
            </div>
        </div>
    </div>

    <!-- Audio Toggle -->
    <div class="sound-toggle bg-white p-3 rounded-full shadow-lg border border-slate-200 flex items-center gap-2">
        <button id="toggleAudioBtn" onclick="toggleMute()" class="p-2 rounded-full hover:bg-slate-100 text-slate-600 transition-colors">
            <svg id="audioOnIcon" xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z" />
            </svg>
            <svg id="audioOffIcon" xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z" />
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2" />
            </svg>
        </button>
    </div>

    <script>
        let students = ['Alex', 'Jordan', 'Taylor', 'Morgan', 'Casey', 'Riley', 'Jamie', 'Quinn'];
        let currentRotation = 0;
        let isSpinning = false;
        let selectedIndex = -1;
        let audioEnabled = true;
        let audioCtx = null;

        const wheel = document.getElementById('wheel');
        const studentList = document.getElementById('studentList');
        const studentInput = document.getElementById('studentInput');
        const spinBtn = document.getElementById('spinBtn');
        const resultModal = document.getElementById('resultModal');
        const winnerNameText = document.getElementById('winnerName');
        const studentCountText = document.getElementById('studentCount');

        const colors = ['#6366f1', '#10b981', '#f59e0b', '#f43f5e', '#8b5cf6', '#ec4899', '#06b6d4', '#f97316', '#3b82f6', '#14b8a6'];

        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }

        function playSound(type) {
            if (!audioEnabled || !audioCtx) return;
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            if (type === 'tick') {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(150, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + 0.1);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                osc.start(); osc.stop(audioCtx.currentTime + 0.1);
            } else if (type === 'win') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(440, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(880, audioCtx.currentTime + 0.5);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
                osc.start(); osc.stop(audioCtx.currentTime + 0.5);
            } else if (type === 'pop') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(200, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(600, audioCtx.currentTime + 0.05);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.05);
                osc.start(); osc.stop(audioCtx.currentTime + 0.05);
            }
        }

        function toggleMute() {
            audioEnabled = !audioEnabled;
            document.getElementById('audioOnIcon').classList.toggle('hidden', !audioEnabled);
            document.getElementById('audioOffIcon').classList.toggle('hidden', audioEnabled);
            if (audioEnabled) initAudio();
        }

        function init() {
            renderList();
            renderWheel();
            studentInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') addStudent(); });
        }

        function renderList() {
            studentList.innerHTML = '';
            students.forEach((name, index) => {
                const div = document.createElement('div');
                div.className = 'flex items-center gap-2 p-1 bg-slate-50 rounded-xl border border-slate-200 group focus-within:ring-2 focus-within:ring-indigo-200 transition-all';
                div.innerHTML = `
                    <input type="text" value="${name}" onchange="updateName(${index}, this.value)"
                        class="flex-1 bg-transparent px-3 py-2 font-semibold text-slate-700 outline-none rounded-lg focus:bg-white">
                    <button onclick="removeStudent(${index})" class="p-2 text-slate-400 hover:text-rose-500 transition-colors mr-1">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M9 2a1 1 0 00-.894.553L7.382 4H4a1 1 0 000 2v10a2 2 0 002 2h8a2 2 0 002-2V6a1 1 0 100-2h-3.382l-.724-1.447A1 1 0 0011 2H9zM7 8a1 1 0 012 0v6a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v6a1 1 0 102 0V8a1 1 0 00-1-1z" clip-rule="evenodd" /></svg>
                    </button>`;
                studentList.appendChild(div);
            });
            studentCountText.innerText = `${students.length} Student${students.length !== 1 ? 's' : ''}`;
            spinBtn.disabled = students.length === 0;
        }

        function updateName(index, newName) {
            if (newName.trim()) { students[index] = newName.trim(); renderWheel(); playSound('pop'); } else renderList();
        }

        function renderWheel() {
            wheel.innerHTML = '';
            if (students.length === 0) {
                wheel.innerHTML = '<div class="flex items-center justify-center h-full text-slate-300 font-bold italic">Add names to spin!</div>';
                return;
            }
            const sliceAngle = 360 / students.length;
            const fontSize = Math.max(0.7, Math.min(1.4, 25 / students.length)) + "rem";

            students.forEach((name, i) => {
                // Slices are drawn starting from 0 (top/right). 
                // We'll subtract 90 degrees globally so Student 0 starts at the top.
                const rotation = (i * sliceAngle) - 90;
                
                const sliceContainer = document.createElement('div');
                sliceContainer.className = 'slice';
                sliceContainer.style.transform = `rotate(${rotation}deg)`;
                
                const bg = document.createElement('div');
                bg.style.position = 'absolute';
                bg.style.width = '1000px'; 
                bg.style.height = '1000px';
                bg.style.top = '0'; 
                bg.style.left = '0';
                bg.style.background = colors[i % colors.length];
                bg.style.transformOrigin = '0 0';
                
                const rad = (sliceAngle * Math.PI) / 180;
                const x = 100 * Math.cos(rad);
                const y = 100 * Math.sin(rad);
                bg.style.clipPath = `polygon(0 0, 100% 0, ${x}% ${y}%, 0 0)`;
                
                const content = document.createElement('div');
                content.className = 'slice-content';
                content.style.transform = `rotate(${sliceAngle / 2}deg)`;
                content.style.fontSize = fontSize;
                content.innerText = name;

                sliceContainer.appendChild(bg);
                sliceContainer.appendChild(content);
                wheel.appendChild(sliceContainer);
            });
        }

        function addStudent() {
            const name = studentInput.value.trim();
            if (name) { students.push(name); studentInput.value = ''; renderList(); renderWheel(); playSound('pop'); studentInput.focus(); }
        }

        function removeStudent(index) { students.splice(index, 1); renderList(); renderWheel(); playSound('pop'); }

        function clearAll() { if (confirm("Clear all students?")) { students = []; renderList(); renderWheel(); playSound('pop'); } }

        function spin() {
            if (isSpinning || students.length === 0) return;
            initAudio();
            isSpinning = true; 
            spinBtn.disabled = true;

            const sliceAngle = 360 / students.length;
            const extraRotations = 5 + Math.floor(Math.random() * 5);
            
            // Randomly select a winner index
            const winnerIndex = Math.floor(Math.random() * students.length);
            
            // To make winnerIndex land at the pointer (0 degrees top):
            // The wheel rotation 0 has student 0 at the top.
            // Student X is at X * sliceAngle.
            // To bring Student X to the top (0 position), we rotate the wheel by -(X * sliceAngle + halfSlice).
            const targetLandingRotation = 360 - (winnerIndex * sliceAngle + (sliceAngle / 2));
            
            // Total rotation = current + some amount to land on targetLandingRotation
            const totalSpinAngle = (extraRotations * 360) + (targetLandingRotation - (currentRotation % 360) + 360) % 360;
            currentRotation += totalSpinAngle;
            
            wheel.style.transform = `rotate(${currentRotation}deg)`;

            // Sound logic
            const startTime = performance.now();
            const duration = 5000;
            let lastTickAngle = 0;
            function checkTick(timestamp) {
                if (!isSpinning) return;
                const elapsed = timestamp - startTime;
                const progress = Math.min(elapsed / duration, 1);
                const easedProgress = 1 - Math.pow(1 - progress, 3); 
                const currentAngle = easedProgress * totalSpinAngle;
                if (currentAngle - lastTickAngle >= sliceAngle) { playSound('tick'); lastTickAngle += sliceAngle; }
                if (progress < 1) requestAnimationFrame(checkTick);
            }
            requestAnimationFrame(checkTick);

            setTimeout(() => {
                selectedIndex = winnerIndex;
                winnerNameText.innerText = students[selectedIndex];
                resultModal.classList.remove('hidden');
                playSound('win');
                isSpinning = false; 
                spinBtn.disabled = false;
            }, 5100);
        }

        function closeModal() { resultModal.classList.add('hidden'); playSound('pop'); }
        function removeSelected() { if (selectedIndex !== -1) { students.splice(selectedIndex, 1); renderList(); renderWheel(); } closeModal(); }

        window.onload = init;
    </script>
</body>
</html>
